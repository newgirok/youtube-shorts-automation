name: Deploy Worker (reusable)
on:
  workflow_call:
    inputs:
      worker_name:
        required: true
        type: string
    secrets:
      ECR_URI:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-northeast-2 | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_URI }}
      - name: Build & push
        run: |
          docker build \
            -t ${{ secrets.ECR_URI }}/${{ inputs.worker_name }}:${{ github.sha }} \
            -f apps/workers/${{ inputs.worker_name }}/Dockerfile .
          docker push ${{ secrets.ECR_URI }}/${{ inputs.worker_name }}:${{ github.sha }}
