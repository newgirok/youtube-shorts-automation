name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/web/**
      - packages/shared/**
      - .github/workflows/deploy-web.yml

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 682251233572.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::682251233572:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch build secrets from SSM
        id: ssm
        run: |
          echo "NEXT_PUBLIC_API_URL=$(aws ssm get-parameter --name 'shorts.prod.NEXT_PUBLIC_API_URL' --query 'Parameter.Value' --output text)" >> $GITHUB_OUTPUT
          echo "NEXT_PUBLIC_API_SECRET=$(aws ssm get-parameter --name 'shorts.prod.NEXT_PUBLIC_API_SECRET' --with-decryption --query 'Parameter.Value' --output text)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ steps.ssm.outputs.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_API_SECRET="${{ steps.ssm.outputs.NEXT_PUBLIC_API_SECRET }}" \
            -f apps/web/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Deploy to EC2 via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=prod-web" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region $AWS_REGION)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "EC2 인스턴스를 찾을 수 없습니다 (tag:Name=prod-web)"
            exit 1
          fi
          echo "인스턴스 ID: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["systemctl restart web"]' \
            --region $AWS_REGION \
            --query "Command.CommandId" \
            --output text)
          echo "SSM 명령 ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region $AWS_REGION

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region $AWS_REGION \
            --query "Status" \
            --output text)
          echo "배포 결과: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
