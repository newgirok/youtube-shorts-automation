name: Deploy API
on:
  push:
    branches: [main]
    paths: [apps/api/**, packages/**]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shorts/api build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2
      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ secrets.ECR_API_URI }}
      - name: Build & push Docker image
        run: |
          docker build -t ${{ secrets.ECR_API_URI }}:${{ github.sha }} -f apps/api/Dockerfile .
          docker push ${{ secrets.ECR_API_URI }}:${{ github.sha }}
