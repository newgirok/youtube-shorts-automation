name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/api/**
      - packages/shared/**
      - .github/workflows/deploy-api.yml

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::682251233572:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @shorts/shared prisma:generate && pnpm --filter @shorts/shared build

      - name: Copy Prisma binary
        run: |
          PRISMA_BIN=$(find node_modules/.pnpm -name "libquery_engine-rhel-openssl-3.0.x.so.node" | head -1)
          cp "$PRISMA_BIN" apps/api/

      - name: Deploy API
        run: |
          cd apps/api
          npx serverless@3 deploy --stage prod
