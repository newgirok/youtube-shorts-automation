name: Deploy Workers

on:
  workflow_dispatch:
    inputs:
      worker:
        description: '배포할 Worker (all / script / tts / subtitle / render / upload)'
        required: true
        default: all
  push:
    branches: [main]
    paths:
      - apps/workers/**
      - packages/shared/**
      - .github/workflows/deploy-workers.yml

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 682251233572.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  # ── esbuild Lambda workers (script/tts/subtitle/upload) ──────────────────
  deploy-lambda:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        worker: [script, tts, subtitle, upload]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::682251233572:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @shorts/shared build

      - name: Deploy ${{ matrix.worker }}-worker
        run: |
          cd apps/workers/${{ matrix.worker }}
          npx serverless deploy --stage prod

  # ── render-worker (Lambda Container Image) ───────────────────────────────
  deploy-render:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::682251233572:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build shared
        run: pnpm install --frozen-lockfile && pnpm --filter @shorts/shared build && pnpm --filter @shorts/render-worker build

      - name: Build & push render Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            --provenance=false \
            -f apps/workers/render/Dockerfile \
            -t $ECR_REGISTRY/render-worker:latest \
            -t $ECR_REGISTRY/render-worker:${{ github.sha }} \
            .
          docker push $ECR_REGISTRY/render-worker:latest
          docker push $ECR_REGISTRY/render-worker:${{ github.sha }}

      - name: Deploy render-worker (serverless)
        run: |
          cd apps/workers/render
          npx serverless deploy --stage prod
