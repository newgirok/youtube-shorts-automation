service: shorts-tts-worker

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs22.x
  region: ap-northeast-2
  role: arn:aws:iam::682251233572:role/prod-LambdaWorkerRole
  environment:
    DATABASE_URL: ${ssm:shorts.prod.DATABASE_URL}
    S3_BUCKET_NAME: jobs-prod-682251233572
    SQS_SUBTITLE_QUEUE_URL: https://sqs.ap-northeast-2.amazonaws.com/682251233572/prod-subtitle-queue
    # EDGE_TTS_PATH — Lambda Layer의 wrapper script 경로
    EDGE_TTS_PATH: /opt/bin/edge-tts

functions:
  handler:
    handler: src/handler.handler
    timeout: 120
    memorySize: 512
    # layers 항목: infra/lambda-layers/build-layers.ps1 실행 후 ARN으로 교체
    layers:
      - arn:aws:lambda:ap-northeast-2:682251233572:layer:prod-edge-tts:1
    events:
      - sqs:
          arn: arn:aws:sqs:ap-northeast-2:682251233572:prod-tts-queue
          batchSize: 1
          functionResponseType: ReportBatchItemFailures

plugins:
  - serverless-esbuild

package:
  individually: true

custom:
  esbuild:
    bundle: true
    minify: true
    format: cjs
    target: node22
    sourcemap: false
    exclude:
      - '@aws-sdk/*'
    nativeZip: true
    packager: pnpm
